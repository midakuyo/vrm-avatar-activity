# 콘솔 로그 로테이션 — 대화 내용이 섞일 수 있는 로그가 무기한 쌓이지 않게
# (docs/data-inventory.md 2장. 내용 자체는 LOG_VERBOSE=0으로 끈다)
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  bot:
    build: ./bot
    logging: *default-logging
    # 기억 파일을 호스트 사용자 소유로 만들어 밖에서 읽고 고칠 수 있게 한다.
    # (bot에 npm install 할 때는 --user root 필요)
    user: "1000:1000"
    env_file:
      # 모드는 변수로 갈린다: DISCORD_TOKEN 비면 web 모드(discordsays 오리진 비활성),
      # LLM_API_URL 있으면 외부 API 모드, CF_*·LLM_* 둘 다 없으면 LLM 스텁.
      - path: .env
        required: false
    volumes:
      - ./bot:/app
      - bot_node_modules:/app/node_modules
      # 기억(대화 요약·장기기억). 사람이 읽고 고칠 수 있도록 호스트에 둔다
      - ./data:/app/data
      # 캐릭터 카드 (frontmatter big_five + 산문 프롬프트). persona.md.example 참고.
      # 주의: 파일이 없으면 도커가 디렉터리를 만든다 — 먼저 example을 복사할 것.
      - ./persona.md:/app/persona.md
    expose:
      - "8080"
      - "8081"
    restart: unless-stopped

  # AivisSpeech (= 패키징된 Style-Bert-VITS2). 일본어 감정 스타일 TTS.
  # 첫 기동 시 모델을 볼륨에 내려받는다. GPU 불필요(CPU RTF ~0.5).
  aivis:
    image: ghcr.io/aivis-project/aivisspeech-engine:cpu-latest
    logging: *default-logging
    volumes:
      - aivis_models:/home/user/.local/share/AivisSpeech-Engine-Dev
    expose:
      - "10101"
    restart: unless-stopped

  activity:
    build: ./activity
    logging: *default-logging
    # Caddy가 이 이름으로 reverse_proxy 한다. 컨테이너 이름을 고정해두면
    # compose 프로젝트명이 바뀌어도 Caddyfile을 고칠 일이 없다.
    container_name: avatar-activity
    environment:
      VITE_DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
    volumes:
      - ./activity:/app
      - activity_node_modules:/app/node_modules
    networks:
      - default   # bot/tts와 통신
      - caddynet  # Caddy가 붙는 곳
    # 내부망(LAN)에서 직접 접속하는 테스트용 포트.
    # 외부 노출은 Caddy가 전담하고, 이 포트는 공유기 밖으로 열지 않는다.
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  bot_node_modules:
  activity_node_modules:
  aivis_models:

networks:
  default:
  # 기존 미니PC의 Caddy 네트워크. 여기서 만들지 않는다.
  caddynet:
    external: true
